<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BMI Classification</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>BMI Categories</h1>
<p>Select your BMI range:</p>

<input type="radio" name="bmi" id="under">
<label for="under">Below 18.5</label>

<input type="radio" name="bmi" id="normal">
<label for="normal">18.5 – 24.9</label>

<input type="radio" name="bmi" id="over">
<label for="over">25.0 – 29.9</label>

<input type="radio" name="bmi" id="ob1">
<label for="ob1">30.0 – 34.9</label>

<input type="radio" name="bmi" id="ob2">
<label for="ob2">35.0 – 39.9</label>

<input type="radio" name="bmi" id="ob3">
<label for="ob3">40.0 or higher</label>

<div class="result">

<div class="under">
Underweight ⚠️
</div>

<div class="normal">
Healthy Weight (Normal) 😊
</div>

<div class="over">
Overweight 😐
</div>

<div class="ob1">
Obesity (Class I) ⚠️
</div>

<div class="ob2">
Obesity (Class II - Severe) 🚨
</div>

<div class="ob3">
Obesity (Class III - Morbid / Very Severe) 🛑
</div>

</div>

</div>

</body>
</html>
